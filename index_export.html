    // Helper: Plot SVG Sparklines (Inline data vectors)
    function generateSparklineHTML(data, color = '#3b82f6') {
      const min = Math.min(...data);
      const max = Math.max(...data);
      const range = max - min || 1;
      const w = 70;
      const h = 20;
      const points = data.map((v, i) => {
        const x = (i / (data.length - 1)) * (w - 4) + 2;
        const y = h - ((v - min) / range) * (h - 4) - 2;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      const endX = w - 2;
      const endY = h - ((data[data.length - 1] - min) / range) * (h - 4) - 2;
      
      return `
        <svg width="${w}" height="${h}" class="overflow-visible inline-block">
          <polyline fill="none" stroke="${color}" stroke-width="1.8" points="${points}" />
          <circle cx="${endX}" cy="${endY}" r="2" fill="${color}" />
        </svg>
      `;
    }

    // Dynamic screener bounds changes
    function updateScreenerLimit(metric, val) {
      if (metric === 'pe') {
        currentScreenerPE = val;
        document.getElementById('pe-limit-lbl').innerText = val + '.0x';
      } else if (metric === 'roce') {
        currentScreenerROCE = val;
        document.getElementById('roce-limit-lbl').innerText = val + '.0%';
      }
      applyScreenerCalculations();
    }

    function applyScreenerCalculations() {
      const parent = document.getElementById('screener-results');
      let count = 0;
      let html = '';

      Object.values(COMPANIES).forEach(co => {
        if (co.peTtm <= currentScreenerPE && co.roce >= currentScreenerROCE) {
          count++;
          const quartersChronological = [...co.financials].reverse();
          const limitRevenues = quartersChronological.map(f => f.revenueCr);
          
          html += `
            <tr onclick="navigate('detail', '${co.id}')" class="hover:bg-neutral-900/40 cursor-pointer">
              <td class="p-3 text-blue-400 font-bold font-mono text-[11px]">${co.ticker}</td>
              <td class="p-3 text-neutral-250 truncate block max-w-[170px] mt-1.5">${co.name}</td>
              <td class="p-3 font-mono text-neutral-300">${co.peTtm}x</td>
              <td class="p-3 text-right font-mono text-emerald-400 font-semibold">${co.roce}%</td>
              <td class="p-3 text-right">${generateSparklineHTML(limitRevenues, '#10b981')}</td>
            </tr>
          `;
        }
      });

      parent.innerHTML = html;
      document.getElementById('matched-count-text').innerText = count + ' corporate nodes matched';
    }

    // Dynamic multi-stage DCF algorithm
    function updateDcfVariable(variable, val) {
      document.getElementById(variable + '-val').innerText = parseFloat(val).toFixed(1) + (variable==='pe'?'x':'%');
      recalculateDcfModelValuation();
    }

    function recalculateDcfModelValuation() {
      const co = COMPANIES[selectedDetailId];
      // Gather dynamic slider inputs
      const wacc = parseFloat(document.querySelector('input[type="range"][min="6"]') ? document.querySelector('input[type="range"][min="6"]').value : (selectedDetailId==='reliance'?11.2:(selectedDetailId==='tcs'?9.5:(selectedDetailId==='infosys'?9.8:10.5))));
      const g1 = parseFloat(document.querySelector('input[type="range"][min="2"]') ? document.querySelector('input[type="range"][min="2"]').value : (selectedDetailId==='reliance'?13.5:(selectedDetailId==='tcs'?10.0:(selectedDetailId==='infosys'?8.5:11.0))));
      const gTerm = parseFloat(document.querySelector('input[type="range"][min="0"][max="6"]') ? document.querySelector('input[type="range"][min="0"][max="6"]').value : 4.0);

      const netProfit = co.financials[4]?.profitCr || 15000;
      const r = wacc / 100;
      const g1_rate = g1 / 100;
      const terminalG_rate = gTerm / 100;

      let sumCf = 0;
      let tempCf = netProfit;

      for (let yr = 1; yr <= 5; yr++) {
        tempCf = tempCf * (1 + g1_rate);
        sumCf += tempCf / Math.pow(1 + r, yr);
      }

      for (let yr = 6; yr <= 10; yr++) {
        tempCf = tempCf * (1 + 0.05); // Stage 2 flat revert
        sumCf += tempCf / Math.pow(1 + r, yr);
      }

      const terminalValue = (tempCf * (1 + terminalG_rate)) / (r - terminalG_rate > 0 ? r - terminalG_rate : 0.05);
      const discountedTerminalValue = terminalValue / Math.pow(1 + r, 10);
      const totalEquityWorthCr = sumCf + discountedTerminalValue;
      const sharesDivisor = (co.marketCapCr / co.price) || 500;
      const perShare = (totalEquityWorthCr / sharesDivisor) * 1.6;

      const fairResult = Math.round(perShare);
      document.getElementById('val-fair-target').innerHTML = `₹${fairResult.toLocaleString('en-IN')} <span class="text-xs text-neutral-500 font-normal">per share</span>`;

      // Check spread
      const spread = fairResult - co.price;
      const discountPct = Math.round((spread / co.price) * 100);
      const badge = document.getElementById('val-discount-badge');
      if (spread >= 0) {
        badge.innerText = `${discountPct}% Undervalued`;
        badge.className = "text-xs font-mono font-bold px-3 py-1.5 border uppercase rounded-xl bg-emerald-500/10 text-emerald-400 border-emerald-500/20";
      } else {
        badge.innerText = `${Math.abs(discountPct)}% Premium`;
        badge.className = "text-xs font-mono font-bold px-3 py-1.5 border uppercase rounded-xl bg-red-500/10 text-red-400 border-red-500/20";
      }

      // Thesis block writer
      const modelStance = spread >= 0 ? "attractive undervalued buying threshold with favorable growth cushions" : "fully valued or trading at margins exceeding baseline discount rates";
      document.getElementById('val-thesis-box').innerText = `Audited thesis for ${co.ticker}: Calibrated cost of capital structure configured at ${wacc.toFixed(1)}% (WACC) alongside a Terminal Gordon rate of ${gTerm.toFixed(1)}%. Projected Stage 1 year 1-5 topline CAGR trades at ${g1.toFixed(1)}%. Based on continuous cash valuations, the common equity presents an ${modelStance} relative to current trading quotes. Intrinsic target evaluated at ₹${fairResult.toLocaleString('en-IN')}.`;
    }

    function handleSaveDcfParameters() {

    // Dynamic Radar SVG coordinates plotter
    function generateRadarSVG(ids) {
      const w = 160;
      const h = 160;
      const cx = w / 2;
      const cy = h / 2;
      const r = 60;
      const numAxes = 5;
      
      let axisLinesHTML = '';
      let outerPolygonPoints = '';
      
      // Concentric pentagons backgrounds
      for (let scale = 0.25; scale <= 1; scale += 0.25) {
        let pentPoints = [];
        for (let i = 0; i < numAxes; i++) {
          const angle = (i * 72 * Math.PI) / 180 - Math.PI / 2;
          const px = cx + r * scale * Math.cos(angle);
          const py = cy + r * scale * Math.sin(angle);
          pentPoints.push(`${px.toFixed(1)},${py.toFixed(1)}`);
        }
        axisLinesHTML += `<polygon points="${pentPoints.join(' ')}" fill="none" stroke="#26272b" stroke-width="1" />`;
      }

      // Draw axes axes lines
      for (let i = 0; i < numAxes; i++) {
        const angle = (i * 72 * Math.PI) / 180 - Math.PI / 2;
        const ax = cx + r * Math.cos(angle);
        const ay = cy + r * Math.sin(angle);
        axisLinesHTML += `<line x1="${cx}" y1="${cy}" x2="${ax.toFixed(1)}" y2="${ay.toFixed(1)}" stroke="#26272b" stroke-width="1.2" />`;
      }

      // Plotted profiles
      const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ec4899'];
      let dataPolygonsHTML = '';

      ids.forEach((id, companyIdx) => {
        const co = COMPANIES[id];
        if (!co) return;

        // Metric vectors scaled from 0.2 to 1.0 (roce, rev growth, margins, reverse pe, leverage)
        const metrics = [
          co.roce / 45,
          co.revenueCagr3Y / 25,
          0.16, // margins
          (50 - co.peTtm) / 50, // relative inverse PE scaling
          (3 - co.debtToEquity) / 3 // leverage health
        ];

        let coordPoints = [];
        metrics.forEach((scale, i) => {
          const angle = (i * 72 * Math.PI) / 180 - Math.PI / 2;
          const cappedScale = Math.min(1.0, Math.max(0.15, scale));
          const px = cx + r * cappedScale * Math.cos(angle);
          const py = cy + r * cappedScale * Math.sin(angle);
          coordPoints.push(`${px.toFixed(1)},${py.toFixed(1)}`);
        });

        dataPolygonsHTML += `
          <polygon points="${coordPoints.join(' ')}" fill="${colors[companyIdx]}" fill-opacity="0.12" stroke="${colors[companyIdx]}" stroke-width="1.8" />
        `;
      });

      return `
        <svg width="100%" height="100%" viewBox="0 0 ${w} ${h}">
          ${axisLinesHTML}
          ${dataPolygonsHTML}
        </svg>
      `;
    }

    // Dynamic autocomplete company search triggers
    function filterRegistry() {
      const q = document.getElementById('inventory-search').value.toLowerCase();
      const sec = document.getElementById('sector-select').value;
      const sig = document.getElementById('signal-select').value;

      document.querySelectorAll('#registry-grid > div').forEach(card => {
        const name = card.getAttribute('data-name');
        const tick = card.getAttribute('data-ticker');
        const cardSec = card.getAttribute('data-sector');
        const cardSig = card.getAttribute('data-signal');

        const matchText = name.includes(q) || tick.includes(q);
        const matchSector = sec === 'All' || cardSec.includes(sec);
        const matchSignal = sig === 'All' || cardSig === sig;

        if (matchText && matchSector && matchSignal) {
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });
    }

    // Dynamic formulations Question Engine packer
    function renderQuestionPackFormulation(pack) {
      const parent = document.getElementById('qp-formulation-deck');
      if (!pack || pack.questions.length === 0) {
        parent.innerHTML = `<div class="p-4 text-neutral-500 font-mono text-center text-[11px]">No formulations added. Insert target question parameters...</div>`;
        return;
      }

      let html = '';
      pack.questions.forEach((q, posIdx) => {
        html += `
          <div class="p-3 bg-neutral-950/45 border border-neutral-850 rounded-xl flex items-start gap-3 justify-between">
            <div class="flex items-center gap-1.5 flex-1 min-w-0">
              <span class="text-[10px] font-mono text-neutral-500 w-3 font-semibold">#${posIdx+1}</span>
              <input type="text" value="${q.text}" onchange="updateFormulaText(${posIdx}, this.value)" class="bg-transparent text-xs text-neutral-200 outline-none w-full border-b border-transparent focus:border-blue-500">
            </div>
            
            <div class="flex gap-1.5 shrink-0 select-none">
              <button onclick="shiftFormulaOrder(${posIdx}, -1)" class="p-1 bg-neutral-900 border border-neutral-800 rounded-lg hover:text-white" title="Move Up"><i data-lucide="chevron-up" class="w-3.5 h-3.5"></i></button>
              <button onclick="shiftFormulaOrder(${posIdx}, 1)" class="p-1 bg-neutral-900 border border-neutral-800 rounded-lg hover:text-white" title="Move Down"><i data-lucide="chevron-down" class="w-3.5 h-3.5"></i></button>
              <button onclick="deleteFormulaQuery(${posIdx})" class="p-1 bg-neutral-900 border border-neutral-800 rounded-lg hover:text-red-400" title="Delete"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
            </div>
          </div>
        `;
      });
      parent.innerHTML = html;
      lucide.createIcons();
    }

    function addNewCustomQuestion() {
      const input = document.getElementById('new-query-input');
      const val = input.value.trim();
      if (!val) return;

      let pack = qpHistory.find(pq => pq.companyId === selectedDetailId);
      if (!pack) {
        pack = { id: `qp-${selectedDetailId}-${Date.now()}`, companyId: selectedDetailId, companyName: COMPANIES[selectedDetailId].ticker, questions: [] };
        qpHistory.push(pack);
      }

      pack.questions.push({ id: `q-${Date.now()}`, text: val });
      input.value = '';
      navigate('questions');
    }

    function updateFormulaText(idx, text) {
      const pack = qpHistory.find(pq => pq.companyId === selectedDetailId);
      if (pack && pack.questions[idx]) {
        pack.questions[idx].text = text;
      }
    }

    function shiftFormulaOrder(idx, diff) {
      const pack = qpHistory.find(pq => pq.companyId === selectedDetailId);
      if (!pack) return;
      const targetIdx = idx + diff;
      if (targetIdx < 0 || targetIdx >= pack.questions.length) return;

      const temp = pack.questions[idx];
      pack.questions[idx] = pack.questions[targetIdx];
      pack.questions[targetIdx] = temp;
      navigate('questions');
    }

    function deleteFormulaQuery(idx) {
      const pack = qpHistory.find(pq => pq.companyId === selectedDetailId);
      if (pack) {
        pack.questions.splice(idx, 1);
        navigate('questions');
      }
    }

    function copyQuestionPackClipboard() {
      const pack = qpHistory.find(pq => pq.companyId === selectedDetailId);
      if (!pack || pack.questions.length === 0) return;

      const strOut = pack.questions.map((q, idx) => `${idx+1}. ${q.text}`).join('\n');
      navigator.clipboard.writeText(strOut).then(() => {
        alert("✓ Formulation pack questions successfully copied to your OS clipboard.");
      });
    }

    // Autocomplete searches Command Palette
    function handleGlobalSearch(q) {
      if (!q.trim()) return;
      // Toggle to standard directory and filter
      navigate('companies');
      document.getElementById('inventory-search').value = q;
      filterRegistry();
    }

    function togglePalette(visible) {
      isPaletteOpen = visible;
      const palette = document.getElementById('cmd-palette');
      if (visible) {
        palette.classList.remove('hidden');
        document.getElementById('cmd-search').value = '';
        renderPaletteList('');
        document.getElementById('cmd-search').focus();
      } else {
        palette.classList.add('hidden');
      }

    function renderPaletteList(q) {
      const parent = document.getElementById('cmd-list');
      const filtered = Object.values(COMPANIES).filter(c => 
        c.ticker.toLowerCase().includes(q.toLowerCase()) || 
        c.name.toLowerCase().includes(q.toLowerCase())
      );

      let html = '';
      if (filtered.length === 0) {
        html = `<div class="p-3 text-neutral-500 font-mono text-center text-xs">No coverage nodes matched.</div>`;
      } else {
        filtered.forEach(c => {
          html += `
            <button onclick="executePaletteNavigation('${c.id}')" class="w-full text-left p-2.5 hover:bg-neutral-800/40 text-xs flex justify-between items-center transition-colors">
              <div>
                <strong class="text-neutral-100 font-mono">${c.ticker}</strong>
                <span class="block text-[10px] text-neutral-500">${c.name} • ${c.sector}</span>
              </div>
              <span class="text-[9px] bg-neutral-900 border border-neutral-800 text-neutral-400 px-1 py-0.2 rounded font-mono">${c.exchange}</span>
            </button>
          `;
        });
      }
      parent.innerHTML = html;
    }

    // Select pallet company route
    function executePaletteNavigation(id) {
      togglePalette(false);
      // Link to Slot indices if in compare page slot search
      if (currentTab === 'compare') {
        const emptyIdx = selectedCompareIds.findIndex((c, i) => !c);
        if (selectedCompareIds.includes(id)) {
          alert("✓ Target comparable is already loaded in Slot selection.");
          return;
        }
        if (emptyIdx !== -1) {
          selectedCompareIds[emptyIdx] = id;
        } else if (selectedCompareIds.length < 4) {
          selectedCompareIds.push(id);
        } else {
          selectedCompareIds[3] = id; // overwrite slot 4
        }
        navigate('compare');
      } else {
        navigate('detail', id);
      }
    }

    // Toggle tour onboarding steps tutorial
    function toggleOnboarding(visible) {
      const container = document.getElementById('onboarding-card');
      if (visible) {
        container.classList.remove('hidden');
        renderTourOnboardingProgress();
      } else {
        container.classList.add('hidden');
      }

    function renderTourOnboardingProgress() {
      const parent = document.getElementById('onboarding-card');
      const steps = [
        { title: "Search a Ticker (Cmd+K)", desc: "Trigger the Cmd+K system Command Palette index anytime from search bars to deep dive into unbilled ratios." },
        { title: "Multi-Criteria Screener", desc: "Access dynamic slide filters under different multiples to test margins standard conversions." },
        { title: "Pre-call formulation Packs", desc: "Build targeted management conference query decks with direct clipboard export metrics." }

      const item = steps[onboardingStep];
      parent.innerHTML = `
        <div class="space-y-4">
          <div class="flex justify-between items-center text-xs font-mono font-bold text-blue-400">
            <span>Analyst Tour — Step ${onboardingStep+1} of 3</span>
            <button onclick="toggleOnboarding(false)" class="text-neutral-500 hover:text-white p-0.5 hover:bg-neutral-800 rounded"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
          </div>
          <div>
            <h4 class="text-xs font-bold text-neutral-200 mt-1">${item.title}</h4>
            <p class="text-[10px] text-neutral-400 mt-1 leading-relaxed">${item.desc}</p>
          </div>
          <div class="flex items-center gap-1.5 progress-bullets">
            ${[0,1,2].map(i => `<div class="h-1 flex-1 rounded-full ${i <= onboardingStep ? 'bg-blue-500' : 'bg-neutral-800'}"></div>`).join('')}
          </div>
          <div class="flex justify-between items-center pt-2.5">
            <button onclick="toggleOnboarding(false)" class="text-[10px] font-mono hover:underline text-neutral-500 hover:text-neutral-300">Skip onboarding</button>
            <button onclick="advanceOnboardingTour()" class="px-3 py-1 bg-blue-600 hover:bg-blue-500 text-white font-bold text-[10px] rounded-lg flex items-center gap-1 transition-colors border border-blue-500">
              <span>${onboardingStep === 2 ? 'Finish tour' : 'Continue'}</span> <i data-lucide="arrow-right" class="w-3 h-3"></i>
            </button>
          </div>
        </div>
      `;
      lucide.createIcons();

    function advanceOnboardingTour() {
      if (onboardingStep < 2) {
        onboardingStep++;
        renderTourOnboardingProgress();
      } else {
        onboardingStep = 0;
        localStorage.setItem('investiq_tour_dismissed', 'true');
        toggleOnboarding(false);
